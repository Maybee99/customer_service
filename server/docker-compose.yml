
services:
 etcd:
   container_name: milvus-etcd
   image: quay.io/coreos/etcd:v3.5.5
   restart: unless-stopped
   environment:
     - ETCD_AUTO_COMPACTION_MODE=revision
     - ETCD_AUTO_COMPACTION_RETENTION=1000
     - ETCD_QUOTA_BACKEND_BYTES=4294967296
     - ETCD_SNAPSHOT_COUNT=50000
   volumes:
     - ./data/milvus/etcd:/etcd
   command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
   healthcheck:
     test: ["CMD", "etcdctl", "endpoint", "health"]
     interval: 30s
     timeout: 20s
     retries: 3

 minio:
   container_name: milvus-minio
   image: minio/minio:RELEASE.2023-03-20T20-16-18Z
   restart: unless-stopped
   environment:
     MINIO_ROOT_USER: minioadmin
     MINIO_ROOT_PASSWORD: minioadmin
   volumes:
     - ./data/milvus/minio:/minio-data
   command: minio server /minio-data
   healthcheck:
     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
     interval: 30s
     timeout: 20s
     retries: 3

 milvus:
   container_name: milvus-standalone
   image: milvusdb/milvus:v2.5.0
   restart: unless-stopped
   command: ["milvus", "run", "standalone"]
   depends_on:
     - "etcd"
     - "minio"
   ports:
     - "19530:19530"   # gRPC
     - "9091:9091"     # HTTP
   volumes:
     - ./data/milvus/milvus:/var/lib/milvus
   environment:
     ETCD_ENDPOINTS: etcd:2379
     MINIO_ADDRESS: minio:9000
   healthcheck:
     test: ["CMD", "curl", "-f", "http://localhost:9091/health"]
     interval: 30s
     timeout: 20s
     retries: 3

 # MySQL for conversation persistence
 mysql:
   container_name: customer-mysql
   image: mysql:8.0
   restart: unless-stopped
   environment:
     MYSQL_ROOT_PASSWORD: root123
     MYSQL_DATABASE: customer_service
     MYSQL_USER: customer
     MYSQL_PASSWORD: customer123
   ports:
     - "3307:3306"
   volumes:
     - ./data/mysql:/var/lib/mysql
     - ./scripts/schema.sql:/docker-entrypoint-initdb.d/schema.sql
   command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

 # Redis for cache & task queue
 redis:
   container_name: customer-redis
   image: redis:7-alpine
   restart: unless-stopped
   ports:
     - "6380:6379"
   volumes:
     - ./data/redis:/data
   command: redis-server --appendonly yes

 # FastAPI backend
 backend:
   container_name: customer-backend
   build:
     context: .
     dockerfile: docker/Dockerfile
   restart: unless-stopped
   depends_on:
     - "mysql"
     - "redis"
     - "milvus"
   ports:
     - "8001:8000"
   environment:
     DB_HOST: mysql
     DB_PORT: 3306
     DB_USER: customer
     DB_PASSWORD: customer123
     DB_NAME: customer_service
     REDIS_URL: redis://redis:6379/0
     MILVUS_HOST: milvus
     MILVUS_PORT: 19530
     LLM_API_KEY: ${LLM_API_KEY}
     LLM_API_BASE: https://dashscope.aliyuncs.com/compatible-mode/v1
     LLM_MODEL: qwen-plus
   volumes:
     - ./data/knowledge_store:/app/data/knowledge_store
   env_file:
     - .env

volumes:
 milvus-etcd:
 milvus-minio:
